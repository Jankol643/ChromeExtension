<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmarks Table</title>
    <link rel="stylesheet" href="semantic.min.css">
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <h1>Bookmarks Viewer</h1>

    <div class="filter-container">
        <label for="folderSelect">Select Folder:</label>
        <select id="folderSelect">
            <option value="all">All Bookmarks</option>
        </select>
    </div>

    <!-- Exclude folders input and tags display -->
    <div class="filter-container">
        <label for="excludeFoldersInput">Exclude Folders:</label>
        <input type="text" id="excludeFoldersInput" placeholder="Type folder name and press Enter or comma" />
        <div id="excludedFoldersTags" class="tags-container"></div>
        <button id="applyExclusions">Apply Exclusions</button>
    </div>

    <!-- Pagination Controls -->
    <div id="paginationContainer">
        <button id="showAllBtn">Show all</button>
        <button id="enablePaginationBtn">Enable pagination</button>
        <div class="page-info" id="pageInfo">Page 1 of 1</div> <!-- Added initial text -->
        <div class="page-navigation">
            <button id="firstPageBtn" disabled>First</button>
            <button id="prevPageBtn" disabled>Previous</button>
            <span id="currentPageDisplay">Page 1</span>
            <button id="nextPageBtn" disabled>Next</button>
            <button id="lastPageBtn" disabled>Last</button>
        </div>
        <!-- Add items per page selector to HTML -->
        <select id="itemsPerPageSelect" class="items-per-page">
            <option value="5">5 per page</option>
            <option value="10">10 per page</option>
            <option value="20">20 per page</option>
            <option value="50">50 per page</option>
            <option value="100">100 per page</option>
        </select>
    </div>

    <!-- Counts Container -->
    <div id="countsContainer">
        <div id="bookmarksCount"></div>
        <div id="excludedCount"></div>
    </div>

    <div class="todo-section">
        <h3>Move Tasks (TODO List)</h3>

        <!-- Fomantic-UI Searchable Multi-Select -->
        <div class="field">
            <select id="todoFolderDropdown" multiple="" class="ui fluid search dropdown">
                <option value="">Search and select folders to watch...</option>
            </select>
        </div>

        <div class="todo-controls mt-3">
            <button id="confirmMoveBtn" class="ui red button">Run Auto-Move (Date Folders)</button>
        </div>

        <div class="stats-container">
            <div>Auto-Movable: <span id="autoMoveCount">0</span></div>
            <div>In TODO Folders: <span id="todoCount">0</span></div>
        </div>

        <div class="table-container">
            <div id="loadingOverlayTodo" class="overlay-hidden">
                <div class="spinner"></div>
            </div>
            <datalist id="folderData"></datalist>
            <table id="todoTable">
                <thead>
                    <tr>
                        <th>Bookmark</th>
                        <th>Current Path</th>
                        <th>Target Folder</th>
                        <!-- Other headers -->
                    </tr>
                </thead>
                <tbody id="todoListBody"></tbody>
            </table>
        </div>

    </div>

    <div class="table-container">
        <div id="loadingOverlay" class="overlay overlay-hidden">
            <div class="spinner"></div>
            <div>Loading bookmarks...</div>
        </div>

        <table id="bookmarksTable">
            <thead>
                <tr>
                    <th data-column="rowNumber" class="clickable-header">ID</th>
                    <th data-column="title" class="clickable-header">Title</th>
                    <th data-column="url" class="clickable-header">URL</th>
                    <th data-column="folder" class="clickable-header">Folder</th>
                    <th data-column="dateAdded" class="clickable-header">Date Added</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="jquery.min.js"></script>
    <script src="semantic.min.js"></script>
    <script type="module" src="main.js"></script>
</body>

</html>
